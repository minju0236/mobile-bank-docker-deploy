events {}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;

    map $http_user_agent $frontend_upstream {
        default frontend-admin:3001;
        ~*(android|iphone|ipad|ipod|mobile) frontend-mobile-view:3002;
    }

    server {
        listen 3000 default_server;
        server_name _;

        client_max_body_size 20M;

        location /api/ {
            proxy_pass http://backend-spring-api:3004;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /action {
            proxy_pass http://frontend-mobile-action:3003;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /action/ {
            proxy_pass http://frontend-mobile-action:3003;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
