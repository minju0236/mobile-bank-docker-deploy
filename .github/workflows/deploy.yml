name: Deploy Mobile Bank to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to AWS EC2 with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
            set -e

            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch origin main
            git reset --hard origin/main

            docker compose down

            docker compose build backend-spring-api
            docker compose build frontend-admin
            docker compose build frontend-mobile-view
            docker compose build frontend-mobile-action

            docker compose up -d

            docker compose ps
          EOF
